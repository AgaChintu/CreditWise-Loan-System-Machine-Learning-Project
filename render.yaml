services:
  - type: web
    name: creditwise-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: PYTHON_API_URL
        sync: false
      - key: CLIENT_URL
        sync: false

  - type: web
    name: creditwise-python-api
    runtime: python
    rootDir: python-api
    buildCommand: "pip install -r requirements.txt && python train.py"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: CORS_ORIGINS
        sync: false
